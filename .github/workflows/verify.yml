name: Reusable verify

# The canonical CI for every salt-mountain repo. Consumers call it from a thin
# caller (bootstrap.sh generates it). Change CI logic HERE once; every repo picks
# it up on its next release bump.
#
# Every repo runs the SAME checks — format:check, check, test, build — so they are
# deliberately NOT toggleable. A repo missing one of those scripts fails CI by
# design; that's the standard being enforced. (Test-less repos define a no-op
# `test`; bootstrap.sh reports any missing scripts when baselining a repo.)
#
# Branch-protection note: the check reports as "verify / verify".

on:
  workflow_call:
    inputs:
      bun_version:
        description: "CI Bun version (managed by Renovate)."
        type: string
        required: false
        # renovate: datasource=github-releases depName=oven-sh/bun
        default: "1.3.14"
      dependency_review:
        description: "Run dependency-review on PRs. Public-only (API limitation); bootstrap sets it by visibility — not a repo preference."
        type: boolean
        default: false
      extra_scripts:
        description: "Additive only: extra `bun run <name>` scripts a repo runs ON TOP of the standard set (e.g. typecheck:functions)."
        type: string
        required: false
        default: ""

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # One project gate, named once. Every Bun step references it, so a
      # project-less repo (freshly bootstrapped) is green; the standard checks
      # switch on the moment a package.json lands.
      - id: detect
        run: echo "project=${{ hashFiles('package.json') != '' }}" >> "$GITHUB_OUTPUT"

      - name: Dependency review
        if: ${{ inputs.dependency_review && github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

      - name: Setup Bun
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun_version }}

      - name: Cache Bun install cache
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun install --frozen-lockfile

      # Additive extras run before the standard set (fail fast on repo-specific checks).
      - name: Extra scripts
        if: ${{ fromJSON(steps.detect.outputs.project) && inputs.extra_scripts != '' }}
        env:
          EXTRA_SCRIPTS: ${{ inputs.extra_scripts }}
        run: |
          for s in $EXTRA_SCRIPTS; do
            echo "::group::bun run $s"
            bun run "$s"
            echo "::endgroup::"
          done

      # The enforced standard set — same on every repo, no toggles.
      - name: Format check
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun run format:check

      - name: Typecheck
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun run check

      - name: Test
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun run test

      - name: Build
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun run build
