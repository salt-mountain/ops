name: Reusable verify

# Reusable CI every repo calls. format:check / check / test / build run on every
# repo — not toggleable; a missing script fails CI by design. Branch-protection
# context is "verify / verify".

on:
  workflow_call:
    inputs:
      bun_version:
        description: "CI Bun version (managed by Renovate)."
        type: string
        required: false
        # renovate: datasource=github-releases depName=oven-sh/bun
        default: "1.3.14"
      dependency_review:
        description: "Run dependency-review on PRs (public repos only; set by bootstrap)."
        type: boolean
        default: false
      extra_scripts:
        description: "Extra `bun run <name>` scripts, run on top of the standard set."
        type: string
        required: false
        default: ""

# Permissions inherit from the caller — public callers add pull-requests: write
# for the dependency-review comment; private callers stay read-only.

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Gate every Bun step on a package.json, so a project-less repo stays green.
      - id: detect
        run: echo "project=${{ hashFiles('package.json') != '' }}" >> "$GITHUB_OUTPUT"

      - name: Dependency review
        if: ${{ inputs.dependency_review && github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

      - name: Setup Bun
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun_version }}

      - name: Cache Bun install cache
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun install --frozen-lockfile

      # Repo-specific extras, before the standard set.
      - name: Extra scripts
        if: ${{ fromJSON(steps.detect.outputs.project) && inputs.extra_scripts != '' }}
        env:
          EXTRA_SCRIPTS: ${{ inputs.extra_scripts }}
        run: |
          for s in $EXTRA_SCRIPTS; do
            echo "::group::bun run $s"
            bun run "$s"
            echo "::endgroup::"
          done

      # Standard set — runs on every repo.
      - name: Format check
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun run format:check

      - name: Typecheck
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun run check

      - name: Test
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun run test

      - name: Build
        if: ${{ fromJSON(steps.detect.outputs.project) }}
        run: bun run build
